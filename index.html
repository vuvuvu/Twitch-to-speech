<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Chat TTS Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Roboto', sans-serif;
            background-color: transparent;
            color: white;
            overflow: hidden;
        }

        #chatContainer {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: calc(100% - 40px);
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-message {
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 5px;
            animation: fadeIn 0.3s ease-in;
            word-wrap: break-word;
        }

        .chat-message .username {
            color: #ff9ecd;
            font-weight: bold;
            margin-right: 8px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #toggleTTS {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 8px 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        #toggleTTS:hover {
            background-color: rgba(0, 0, 0, 0.9);
        }

        #errorMessage {
            position: fixed;
            top: 60px;
            right: 20px;
            background-color: rgba(255, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 4px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="chatContainer"></div>
    <button id="toggleTTS">TTS: On</button>
    <div id="errorMessage"></div>

    <script src="https://cdn.jsdelivr.net/npm/comfy.js@latest/dist/comfy.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // State
            let ttsEnabled = true;
            const chatterVoices = new Map();
            let allowedVoices = [];

            // Allowed voice configurations
            const ALLOWED_VOICE_CONFIGS = [
                { name: 'Aaron', lang: 'en-US' },
                { name: 'Albert', lang: 'en-US' },
                { name: 'Arthur', lang: 'en-GB' },
                { name: 'Catherine', lang: 'en-AU' },
                { name: 'Daniel', lang: 'en-GB' },
                { name: 'Eddy', lang: 'en-US' },
                { name: 'Fred', lang: 'en-US' }
            ];

            // Elements
            const chatContainer = document.getElementById('chatContainer');
            const toggleTTSButton = document.getElementById('toggleTTS');
            const errorMessageElement = document.getElementById('errorMessage');

            // Initialize voices
            function initVoices() {
                const voices = speechSynthesis.getVoices();
                if (voices.length === 0) {
                    setTimeout(initVoices, 100); // Try again if voices aren't loaded
                    return;
                }

                allowedVoices = voices.filter(voice => 
                    ALLOWED_VOICE_CONFIGS.some(config => 
                        voice.name.includes(config.name) && voice.lang === config.lang
                    )
                );

                if (allowedVoices.length === 0) {
                    showError('No matching voices found. Using system default.');
                    // Use all English voices as fallback
                    allowedVoices = voices.filter(voice => voice.lang.startsWith('en'));
                }
            }

            // Try to initialize voices immediately
            initVoices();
            
            // Also listen for the voices changed event
            speechSynthesis.onvoiceschanged = initVoices;

            // Error handling
            function showError(message, duration = 5000) {
                errorMessageElement.textContent = message;
                errorMessageElement.style.display = 'block';
                setTimeout(() => {
                    errorMessageElement.style.display = 'none';
                }, duration);
            }

            // Spam detection
            function isSpamMessage(message) {
                // Split message into words
                const words = message.split(' ');
                if (words.length <= 1) return false;

                // Check for repeated words
                const uniqueWords = new Set(words);
                if (uniqueWords.size === 1 && words.length > 2) {
                    return true;
                }

                // Check for patterns of repeated sequences
                const messageNormalized = message.toLowerCase();
                const repeated = messageNormalized.match(/(.+?)\1{2,}/g);
                return repeated !== null;
            }

            // Get random voice for chatter
            function getVoiceForChatter(username) {
                if (!chatterVoices.has(username)) {
                    const randomVoice = allowedVoices[Math.floor(Math.random() * allowedVoices.length)];
                    chatterVoices.set(username, randomVoice);
                }
                return chatterVoices.get(username);
            }

            // Create and display chat message
            function createChatMessage(user, message, color) {
                const messageElement = document.createElement('div');
                messageElement.className = 'chat-message';
                
                const usernameSpan = document.createElement('span');
                usernameSpan.className = 'username';
                usernameSpan.textContent = user;
                usernameSpan.style.color = color;

                const messageSpan = document.createElement('span');
                messageSpan.textContent = message;

                messageElement.appendChild(usernameSpan);
                messageElement.appendChild(messageSpan);
                chatContainer.appendChild(messageElement);

                // Remove message after delay
                setTimeout(() => {
                    messageElement.style.animation = 'fadeIn 0.3s ease-in reverse';
                    setTimeout(() => messageElement.remove(), 300);
                }, 10000);

                // Speak message
                if (ttsEnabled && !isSpamMessage(message)) {
                    try {
                        const utterance = new SpeechSynthesisUtterance(message);
                        utterance.voice = getVoiceForChatter(user);
                        speechSynthesis.speak(utterance);
                    } catch (error) {
                        console.error('TTS Error:', error);
                        showError('TTS Error: ' + error.message);
                    }
                }
            }

            // ComfyJS Integration
            ComfyJS.onChat = (user, message, flags, self, extra) => {
                if (!isSpamMessage(message)) {
                    createChatMessage(user, message, extra.userColor || '#ffffff');
                }
            };

            // Initialize ComfyJS
            function initComfy() {
                const urlParams = new URLSearchParams(window.location.search);
                const channel = urlParams.get('channel') || 'twitch'; // Default channel
                
                try {
                    ComfyJS.Init(channel);
                    showError(`Connected to channel: ${channel}`, 3000);
                } catch (error) {
                    console.error('ComfyJS Error:', error);
                    showError('Failed to connect to Twitch chat. Please check the channel name.');
                }
            }

            // Initialize after a short delay to ensure ComfyJS is loaded
            setTimeout(initComfy, 1000);

            // TTS Toggle
            toggleTTSButton.addEventListener('click', () => {
                ttsEnabled = !ttsEnabled;
                toggleTTSButton.textContent = `TTS: ${ttsEnabled ? 'On' : 'Off'}`;
            });

            // Check for Web Speech API support
            if (!window.speechSynthesis) {
                showError('Web Speech API is not supported in this browser');
                ttsEnabled = false;
                toggleTTSButton.disabled = true;
            }
        });
    </script>
</body>
</html>
